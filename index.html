<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FdG">
  <meta name="theme-color" content="#174e7a">
  <title>FdG Alocação</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== TELA DE LOGIN ===== -->
<div id="tela-login">
  <div class="login-card">
    <!-- Logo FdG (mesmo SVG do sistema) -->
    <svg class="login-logo" viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg" aria-label="FdG Fundação da Gide">
      <rect x="4"  y="4"  width="20" height="20" fill="#ffe45f" rx="2"/>
      <polygon points="14,30 4,50 24,50" fill="#76d5ff"/>
      <circle cx="36" cy="38" r="12" fill="#43dd85"/>
      <polygon points="36,8 50,22 36,36 22,22" fill="#174e7a"/>
      <text x="62" y="38" font-family="Affect, Montserrat, sans-serif" font-weight="700" font-size="28" fill="#174e7a" letter-spacing="-0.5">FdG</text>
      <text x="108" y="28" font-family="Inter, sans-serif" font-weight="400" font-size="8.5" fill="#174e7a">Fundação</text>
      <text x="108" y="39" font-family="Inter, sans-serif" font-weight="900" font-size="8.5" fill="#174e7a">da Gide</text>
    </svg>

    <h1 class="login-titulo">Alocação em Projetos</h1>
    <p class="login-sub">Acesse com seu e-mail e senha cadastrados</p>

    <div class="campo">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@fdg.org.br" autocomplete="email" inputmode="email">
    </div>
    <div class="campo">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="login-erro" id="login-erro"></div>
    <button class="btn-login" id="btn-login" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<!-- ===== APP PRINCIPAL ===== -->
<div id="app" style="display:none">

  <!-- Topbar -->
  <div id="topbar">
    <div class="avatar" id="avatar">?</div>
    <span class="nome" id="topbar-nome"></span>
    <div class="mes-nav">
      <button class="btn-mes" onclick="navMes(-1)" aria-label="Mês anterior">‹</button>
      <span class="mes-label" id="mes-label">Junho 2026</span>
      <button class="btn-mes" onclick="navMes(1)" aria-label="Próximo mês">›</button>
    </div>
  </div>

  <!-- Conteúdo principal -->
  <div id="main"></div>

  <!-- Tab bar -->
  <div id="tabbar">
    <button class="tab ativo" id="tab-agenda" onclick="mudarTab('agenda')" aria-label="Agenda">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Agenda</span>
    </button>
    <button class="tab" id="tab-registros" onclick="mudarTab('registros')" aria-label="Registros">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span>Registros</span>
    </button>
    <button class="tab" id="tab-perfil" onclick="mudarTab('perfil')" aria-label="Perfil">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg>
      <span>Perfil</span>
    </button>
  </div>
</div>

<!-- Botão flutuante de registrar -->
<button id="fab" onclick="abrirModalRegistro()" aria-label="Registrar dia">+</button>

<!-- Modal de registro / edição -->
<div class="modal-overlay oculto" id="modal-overlay" onclick="if(event.target===this)fecharModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-titulo" id="modal-titulo">Registrar</div>
    <div id="modal-corpo"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
